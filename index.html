<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Goys are back!</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="bgVideo" class="bg-video" loop playsinline preload="auto">
    <source src="goysrback.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <div id="popupOverlay" class="popup-overlay">
    <div class="popup">
      <p class="popup-text">Are you a goy?</p>
      <div class="popup-buttons">
        <button id="yesButton" type="button">Yes</button>
        <button id="noButton" type="button">No</button>
      </div>
    </div>
  </div>

  <div id="playCounter" class="play-counter">
    goyim have enjoyed this video <span id="playCountValue">0</span> times
  </div>

  <script src="script.js"></script>
</body>
</html>
